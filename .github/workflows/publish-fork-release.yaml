# Build winutil.ps1 and publish a GitHub Release so
# irm "https://github.com/OWNER/winutil/releases/latest/download/winutil.ps1" | iex works.
name: Publish fork release (winutil.ps1)

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          ./Compile.ps1

      - name: Version tag (yy.MM.dd)
        id: ver
        shell: pwsh
        run: |
          $v = Get-Date -Format 'yy.MM.dd'
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release with winutil.ps1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Release ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: ./winutil.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
